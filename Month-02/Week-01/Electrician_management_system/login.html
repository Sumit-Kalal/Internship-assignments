<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - SetLIT</title>
    <link rel="stylesheet" href="style.css">
</head>

<script src="management.js" defer ></script>

<body>

    <header>
        <nav class="navbar">
            <h1 class="logo">SetLIT</h1>
            <ul class="nav-links">
                <button class="btn" onclick="logout()">Logout</button>
                <li><a href="register.html">Register</a></li>
            </ul>
        </nav>
    </header>

    <section class="form-container">
        <h2>Login</h2>

        <form id="loginForm" onsubmit="return validateLogin()">
            
            <div class="form-group">
                <label for="email">Username or Email</label>
                <input type="text" id="email" name="email" placeholder="Enter your username or email" required>
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" placeholder="Enter your password" required>
            </div>

            <button type="submit" class="btn primary" style="width: 100%;">
                Login
            </button>

        </form>

        <p style="margin-top: 15px; text-align: center;">
            Don't have an account? 
            <a href="register.html">Register</a>
        </p>
    </section>
    
    <footer>
        <p>© 2026 SetLIT. All rights reserved.</p>
    </footer>

</body>
</html>
