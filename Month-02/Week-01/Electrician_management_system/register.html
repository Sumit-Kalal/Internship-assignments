<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - SetLIT</title>
    <link rel="stylesheet" href="style.css">
</head>

<script src="management.js" defer ></script>

<body>

    <header>
        <nav class="navbar">
            <h1 class="logo">SetLIT</h1>
            <ul class="nav-links">
                <li><a href="Home.html">Home</a></li>
                <li><a href="login.html">Login</a></li>
            </ul>
        </nav>
    </header>

    <section class="form-container">
        <h2>Create Account</h2>

        <form id="registerForm">

            <div class="form-group">
                <label for="name">Full Name</label>
                <input type="text" id="name" name="name" placeholder="Enter your full name" required>
            </div>
            <div class="form-group">
                <label for="phone">Phone Number</label>
                <input type="tel" id="phone" name="phone" placeholder="Enter your phone number" required>
            </div>
            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" name="email" placeholder="Enter your email" required>
            </div>
            <div class="form-group">
                <label for="role">Select Role</label>
                <select id="role" name="role" required style="width: 100%; padding: 10px; border-radius: 6px; border: 1px solid #dbe9f4;">
                    <option value="">-- Choose Role --</option>
                    <option value="admin">Admin</option>
                    <option value="electrician">Electrician</option>
                </select>
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" placeholder="Create a password" required>
            </div>

            <button type="submit" class="btn primary" style="width: 100%;">
                Register
            </button>

        </form>

        <p style="margin-top: 15px; text-align: center;">
            Already have an account? 
            <a href="login.html">Login</a>
        </p>

    </section>

    <footer>
        <p>© 2026 SetLIT. All rights reserved.</p>
    </footer>

</body>
</html>
