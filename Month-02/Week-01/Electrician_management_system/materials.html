<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Materials Management - SetLIT</title>
    <link rel="stylesheet" href="style.css">
</head>

<script src="management.js"defer></script>

<body>

    <header>
        <nav class="navbar">
            <h1 class="logo">Materials Management</h1>
            <ul class="nav-links">
                <li><a href="dashboard.html">Dashboard</a></li>
                <li><a href="Job management.html">Jobs</a></li>
                <li><a href="Task Tracking.html">Tasks</a></li>
                <li><a href="profile.html">Profile</a></li>
                <button class="btn" onclick="logout()">Logout</button>
            </ul>
        </nav>
    </header>

    <section class="profile-container">

        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
            <h2>Materials</h2>
            <button class="btn primary" onclick="addMaterial()">+ Add Material</button>
        </div>

        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Material Name</th>
                        <th>Quantity</th>
                        <th>Usage</th>
                        <th>Status</th>
                        <th>Actions</th>
                    </tr>
                </thead>

                <tbody>
                    <tr>
                        <td>1</td>
                        <td>Copper Wire</td>
                        <td>150 m</td>
                        <td>
                            <div class="progress-bar">
                                <div class="progress" style="width: 60%;"></div>
                            </div>
                        </td>
                        <td><span class="status sufficient">Sufficient</span></td>
                        <td>
                            <button class="btn" onclick="editMaterial(1)">Edit</button>
                            <button class="btn" style="border-color: red; color: red;" onclick="deleteMaterial(1)">
                                Delete
                            </button>
                        </td>
                    </tr>

                    <tr>
                        <td>2</td>
                        <td>Switches</td>
                        <td>40 pcs</td>
                        <td>
                            <div class="progress-bar">
                                <div class="progress" style="width: 85%;"></div>
                            </div>
                        </td>
                        <td><span class="status low">Low Stock</span></td>
                        <td>
                            <button class="btn" onclick="editMaterial(2)">Edit</button>
                            <button class="btn" style="border-color: red; color: red;" onclick="deleteMaterial(2)">
                                Delete
                            </button>
                        </td>
                    </tr>

                    <tr>
                        <td>3</td>
                        <td>LED Bulbs</td>
                        <td>20 pcs</td>
                        <td>
                            <div class="progress-bar">
                                <div class="progress" style="width: 95%;"></div>
                            </div>
                        </td>
                        <td><span class="status critical">Critical</span></td>
                        <td>
                            <button class="btn" onclick="editMaterial(3)">Edit</button>
                            <button class="btn" style="border-color: red; color: red;" onclick="deleteMaterial(3)">
                                Delete
                            </button>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>

    </section>

    <footer>
        <p>© 2026 SetLIT. All rights reserved.</p>
    </footer>

</body>
</html>
