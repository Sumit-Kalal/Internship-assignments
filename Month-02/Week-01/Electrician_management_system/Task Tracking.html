<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task Tracking - SetLIT</title>
    <link rel="stylesheet" href="style.css">
</head>

<script src="management.js"defer></script>

<body>
    <header>
        <nav class="navbar">
            <h1 class="logo">Task Tracking</h1>
            <ul class="nav-links">
                <li><a href="dashboard.html">Dashboard</a></li>
                <li><a href="Job management.html">Jobs</a></li>
                <li><a href="Electrician management.html">Electricians</a></li>
                <li><a href="profile.html">Profile</a></li>
                <button class="btn" onclick="logout()">Logout</button>
            </ul>
        </nav>
    </header>

    <section class="profile-container">

        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
            <h2>Tasks</h2>
            <button class="btn primary" onclick="addTask()">+ Add Task</button>
        </div>
        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Task</th>
                        <th>Electrician</th>
                        <th>Progress</th>
                        <th>Status</th>
                        <th>Actions</th>
                    </tr>
                </thead>

                <tbody>
                    <tr>
                        <td>1</td>
                        <td>Install wiring</td>
                        <td>Raj Kumar</td>
                        <td>
                            <div class="progress-bar">
                                <div class="progress" style="width: 70%;"></div>
                            </div>
                        </td>
                        <td><span class="status available">In Progress</span></td>
                        <td>
                            <button class="btn" onclick="editTask(1)">Edit</button>
                            <button class="btn" style="border-color: red; color: red;" onclick="deleteTask(1)">
                                Delete
                            </button>
                        </td>
                    </tr>

                    <tr>
                        <td>2</td>
                        <td>Fix switchboard</td>
                        <td>Amit Sharma</td>
                        <td>
                            <div class="progress-bar">
                                <div class="progress" style="width: 30%;"></div>
                            </div>
                        </td>
                        <td><span class="status pending">Pending</span></td>
                        <td>
                            <button class="btn" onclick="editTask(2)">Edit</button>
                            <button class="btn" style="border-color: red; color: red;" onclick="deleteTask(2)">
                                Delete
                            </button>
                        </td>
                    </tr>

                    <tr>
                        <td>3</td>
                        <td>Office inspection</td>
                        <td>Rajesh Nandan</td>
                        <td>
                            <div class="progress-bar">
                                <div class="progress" style="width: 100%;"></div>
                            </div>
                        </td>
                        <td><span class="status completed">Completed</span></td>
                        <td>
                            <button class="btn" onclick="editTask(3)">Edit</button>
                            <button class="btn" style="border-color: red; color: red;" onclick="deleteTask(3)">
                                Delete
                            </button>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>

    </section>

    <footer>
        <p>© 2026 SetLIT. All rights reserved.</p>
    </footer>

</body>
</html>
